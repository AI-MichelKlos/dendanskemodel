<style>
  /* ============ FORLIG FØR DAGGRY ============
     Flaskegrøn mødebordsfilt, messing og segl-rødt.
     Variabelnavnene er bevaret fra v1, kun værdierne
     (og enkelte detaljer) er skiftet ud. */
  :root{
    --ink:#081b13;   --ink-2:#0a231a;  --ink-3:#123a2c;   /* natten */
    --paper:#f6f1e2; --paper-2:#ece4cf;                    /* dokumenterne */
    --text:#26221a;  --muted:#9db3a6;  --muted-paper:#7d745d;
    --green:#3d8a60; --green-dk:#2e6b4f;                   /* rigtigt svar */
    --red:#b03a2e;   --red-dk:#8c2d24;                     /* seglrød */
    --gold:#c2a35d;  --gold-dk:#8f7433;                    /* messing */
    --line:rgba(194,163,93,.28); --line-paper:#d8d0ba;
    --shadow:0 28px 55px -20px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{min-height:100svh}
  html{overflow-y:auto;-webkit-text-size-adjust:100%}
  body{overflow-x:hidden}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:
      radial-gradient(620px 560px at 50% 40px, rgba(255,233,184,.20) 0%, rgba(255,233,184,.06) 45%, transparent 70%),
      radial-gradient(130% 115% at 50% 42%, transparent 46%, rgba(0,0,0,.55) 100%),
      url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC44IiBudW1PY3RhdmVzPSIyIiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PGZlQ29sb3JNYXRyaXggdHlwZT0ic2F0dXJhdGUiIHZhbHVlcz0iMCIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIiBmaWx0ZXI9InVybCgjbikiIG9wYWNpdHk9IjAuNSIvPjwvc3ZnPg=="),
      var(--ink);
    background-blend-mode:normal,normal,soft-light,normal;
    color:var(--paper);
    display:flex;flex-direction:column;align-items:center;
    padding:18px 16px 24px;-webkit-font-smoothing:antialiased;
  }
  .stage{width:100%;max-width:640px;display:flex;flex-direction:column;gap:14px}

  header.bar{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:2px 4px 8px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:baseline;gap:10px;line-height:1}
  .brand .logo{font-family:'Fraunces',serif;font-weight:700;font-size:22px;letter-spacing:.5px;text-transform:uppercase}
  .casecount{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold);letter-spacing:1px;white-space:nowrap}

  .record{display:flex;align-items:center;gap:10px;background:transparent;border:none;border-top:1px solid var(--line);border-bottom:1px solid var(--line);border-radius:0;padding:9px 4px}
  .segs{display:flex;gap:5px;flex:1}
  .seg{flex:1;height:16px;border-radius:2px;background:#051710;display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:#fff;line-height:1;transition:background .4s,box-shadow .2s}
  .seg.r{background:var(--green)} .seg.w{background:var(--red)}
  .seg.cur{box-shadow:0 0 0 2px var(--gold)}
  .rec-lbl{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#b7c6bc;white-space:nowrap;letter-spacing:.5px}
  .rec-lbl b{color:var(--gold)}

  .panel{position:relative}
  .card,.screen,.avis{overflow-wrap:break-word;min-width:0}
  .card{padding-top:56px !important;background:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC44IiBudW1PY3RhdmVzPSIyIiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PGZlQ29sb3JNYXRyaXggdHlwZT0ic2F0dXJhdGUiIHZhbHVlcz0iMCIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIiBmaWx0ZXI9InVybCgjbikiIG9wYWNpdHk9IjAuNSIvPjwvc3ZnPg=="),linear-gradient(180deg,#f7f1de 0%,#efe6cc 58%,#e2d5b2 100%);background-blend-mode:soft-light;color:var(--text);border-radius:4px;padding:26px 24px 24px;position:relative;overflow:hidden;border:1px solid var(--line-paper);
    transform:rotate(-.3deg);
    box-shadow:0 1px 0 rgba(0,0,0,.05), 0 12px 0 -6px var(--paper-2), 0 13px 0 -5px rgba(0,0,0,.22), var(--shadow)}
  .card > *{position:relative;z-index:1}
  .card > .stamp{position:absolute;z-index:3}
  .card::before{content:"FORLIGSINSTITUTIONEN";position:absolute;top:0;left:24px;right:24px;padding:13px 0 9px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:3.2px;color:var(--gold-dk);border-bottom:3px double rgba(143,116,51,.5);z-index:2}
  .card::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-20deg);font-family:'Fraunces',serif;font-weight:700;font-size:clamp(34px,10vw,58px);letter-spacing:7px;color:rgba(14,59,46,.07);white-space:nowrap;pointer-events:none;z-index:0}
  .stamp{position:absolute;top:16px;right:-4px;transform:rotate(-6deg);font-family:'Permanent Marker','Fraunces',serif;font-weight:400;font-size:16px;letter-spacing:1.2px;text-transform:uppercase;color:var(--red);padding:3px 12px;opacity:.85;border:none;background:transparent}
  .stamp::before{content:"";position:absolute;left:-3px;right:-5px;top:-2px;bottom:-1px;border:2.5px solid var(--red);border-radius:9px 4px 10px 5px;transform:rotate(1.4deg) skewX(-2deg);opacity:.85;pointer-events:none}
  .stamp::after{content:"";position:absolute;left:1px;right:-1px;top:1px;bottom:2px;border-top:2px solid var(--red);border-right:1.5px solid var(--red);border-radius:5px 9px 3px 7px;transform:rotate(-0.8deg);opacity:.45;pointer-events:none}
  .portrait{position:absolute;top:18px;left:18px;width:64px;height:64px;border-radius:50%;overflow:hidden;border:3px solid #fbf7ea;box-shadow:0 4px 12px rgba(0,0,0,.3),0 0 0 1px rgba(143,116,51,.5);background:#2c2823;z-index:2}
  .portrait img{width:100%;height:100%;object-fit:cover;display:block;filter:contrast(1.05) sepia(.15) saturate(.85)}
  .card.has-portrait .meta,.card.has-portrait .country{padding-left:78px}
  .stamp.land{animation:stampIn .55s cubic-bezier(.18,1.25,.3,1) both}
  @keyframes stampIn{0%{opacity:0;transform:rotate(7deg) scale(2.7)}55%{opacity:.85;transform:rotate(7deg) scale(.9)}75%{transform:rotate(7deg) scale(1.05)}100%{opacity:.78;transform:rotate(7deg) scale(1)}}
  .intro-h1{margin-top:2px}
  .intro-kl{font-family:'IBM Plex Mono',monospace;font-size:clamp(15px,4.4vw,20px);letter-spacing:3px;text-transform:uppercase;color:var(--muted-paper);margin:2px 0 14px}
  .meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted-paper);letter-spacing:1px;text-transform:uppercase;margin:6px 0 2px}
  .case-title{hyphens:none;-webkit-hyphens:none;overflow-wrap:break-word;font-family:'Fraunces',serif;font-weight:700;font-size:clamp(25px,6.6vw,36px);line-height:1.04;text-transform:uppercase;letter-spacing:.3px;margin:2px 0 12px;color:#221c10}
  .situation{font-size:15.5px;line-height:1.55;color:#2c2823}
  .question{font-size:16px;line-height:1.45;color:#2c2823;font-weight:500;margin:0 0 14px}
  .answer{margin:4px 0 0;padding:12px 14px;background:rgba(46,107,79,.12);border-left:3px solid var(--green-dk);border-radius:4px;font-size:14.5px;line-height:1.5;color:#2a2620}
  .answer .alab{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--green-dk);display:block;margin-bottom:6px}
  .prompt{font-family:'Fraunces',serif;font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:#6b6457;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
  .prompt::after{content:"";flex:1;height:1px;background:var(--line-paper)}

  .choices{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--line-paper);border-bottom:1px solid var(--line-paper)}
  .choice{text-align:left;width:100%;cursor:pointer;background:transparent;border:none;border-bottom:1px solid var(--line-paper);border-radius:0;padding:14px 12px;display:flex;gap:13px;align-items:flex-start;font-family:inherit;font-size:14.5px;line-height:1.45;color:#2a2620;transition:transform .12s ease,border-color .15s,background .15s,box-shadow .15s}
  .choice:hover{background:rgba(143,116,51,.08);box-shadow:inset 3px 0 0 var(--gold-dk)}
  .choice:last-child{border-bottom:none}
  .choice:focus-visible{outline:3px solid var(--gold);outline-offset:-3px}
  .choice .key{font-family:'Fraunces',serif;font-weight:600;font-style:italic;font-size:19px;width:24px;flex:none;text-align:left;color:var(--gold-dk);text-transform:lowercase;background:none;box-shadow:none}
  .choice .key::after{content:'.'}

  .verdict{display:flex;align-items:center;gap:11px;font-family:'Fraunces',serif;font-weight:700;font-size:clamp(23px,6.6vw,29px);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .verdict .dot{width:15px;height:15px;border-radius:50%;flex:none}
  .verdict.good{color:var(--green-dk)} .verdict.good .dot{background:var(--green)}
  .verdict.bad{color:var(--red-dk)} .verdict.bad .dot{background:var(--red)}
  .vsub{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.5px;color:#6b6457;margin-bottom:14px}
  .truth{margin-top:16px;padding:13px 15px;background:rgba(176,58,46,.09);border-left:3px solid var(--red);border-radius:4px;font-size:13.5px;line-height:1.5;color:#4a443a}
  .truth .lab{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--red-dk);display:block;margin-bottom:7px}
  .country{display:inline-block;font-family:'Fraunces',serif;font-weight:700;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--paper);background:var(--ink-3);padding:4px 11px;border-radius:4px;margin:2px 0 9px}
  .cardsub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted-paper);letter-spacing:.5px;margin:-4px 0 14px}
  .fscene{display:block;width:100%;height:auto;margin:10px 0 4px;border:1px solid var(--line-paper);border-radius:3px;box-shadow:0 10px 26px -12px rgba(0,0,0,.55)}
  .cover-title{hyphens:auto;-webkit-hyphens:auto;overflow-wrap:break-word;font-family:'Fraunces',serif;font-weight:700;font-size:clamp(33px,8.6vw,50px);line-height:1;text-transform:uppercase;letter-spacing:.5px;color:#221c10;margin:6px 0 2px}
  .cover-sub{font-family:'Fraunces',serif;font-weight:400;font-style:italic;font-size:clamp(15px,4vw,19px);letter-spacing:4px;text-transform:uppercase;color:var(--muted-paper);margin-bottom:16px}
  .fors{min-height:72svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 10px 30px}
  .fors .fpraes{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
  .fors .ftitle{hyphens:auto;-webkit-hyphens:auto;overflow-wrap:break-word;font-family:'Fraunces',serif;font-weight:700;font-size:clamp(44px,13.5vw,84px);line-height:.96;text-transform:uppercase;letter-spacing:.5px;color:#f2ede2;text-shadow:0 0 46px rgba(194,163,93,.22)}
  .fors .fsub{font-family:'Fraunces',serif;font-style:italic;font-size:clamp(16px,4.6vw,22px);letter-spacing:3.5px;text-transform:uppercase;color:var(--muted);margin-top:16px}
  .collage{display:flex;justify-content:center;align-items:center;margin:34px 0 8px;padding:0 6px}
  .collage img{width:21%;max-width:104px;height:auto;border:2px solid rgba(194,163,93,.65);border-radius:2px;box-shadow:0 14px 30px -10px rgba(0,0,0,.75);filter:sepia(.22) contrast(1.02);margin:0 -9px}
  .collage img.p0{transform:rotate(-7deg) translateY(10px)}
  .collage img.p1{transform:rotate(3.5deg) translateY(-4px);z-index:2}
  .collage img.p2{transform:rotate(-1.5deg) translateY(-12px);z-index:4;width:24%;max-width:118px}
  .collage img.p3{transform:rotate(5deg) translateY(-2px);z-index:3}
  .collage img.p4{transform:rotate(-4.5deg) translateY(12px)}
  .collage img.portrait-crop{object-fit:cover;aspect-ratio:3/4}
  .fors .fbtn{margin-top:30px}
  .playnote{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:0 0 16px}
  .playnote span{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold-dk);border:1px solid rgba(143,116,51,.45);border-radius:3px;padding:6px 11px;background:rgba(194,163,93,.10)}
  .dossier{border-top:1px solid var(--line-paper);border-bottom:1px solid var(--line-paper);padding:12px 0;margin:0 0 16px;display:flex;flex-direction:column;gap:8px}
  .drow{display:flex;gap:12px;align-items:center;font-size:13.5px}
  .dk{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted-paper);width:92px;flex:none}
  .dv{color:#2c2823}
  .qbox{margin-top:14px;padding:12px 15px;background:rgba(194,163,93,.16);border-left:3px solid var(--gold);border-radius:4px}
  .qbox .qlab{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold-dk);margin-bottom:5px}
  .qbox .qt{font-family:'Fraunces',serif;font-size:15px;line-height:1.55;color:#3f3a31;font-style:italic}
  .qbox .qk{margin-top:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.4px;color:var(--muted-paper)}
  .share-modal{position:fixed;inset:0;background:rgba(3,19,13,.78);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px)}
  .share-box{background:var(--paper);border-radius:10px;padding:22px;max-width:340px;width:100%;box-shadow:0 20px 46px rgba(0,0,0,.5)}
  .share-box h3{font-family:'Fraunces',serif;text-transform:uppercase;letter-spacing:1.5px;font-size:16px;margin:0 0 14px;color:#211d18}
  .share-list{display:flex;flex-direction:column;gap:8px}
  .share-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:6px;font-family:'Inter',sans-serif;font-size:14px;color:#2c2823;cursor:pointer;text-align:left;text-decoration:none}
  .share-btn:hover{background:#f5efe0;border-color:rgba(0,0,0,.25)}

  .share-btn .ico.fb{background:#1877f2}
  .share-btn .ico.x{background:#000}
  .share-btn .ico.wa{background:#25d366}
  .share-btn .ico.tg{background:#229ed9}
  .share-btn .ico.cp{background:var(--gold);color:#1a1710}
  .share-close{margin-top:14px;width:100%;padding:10px;background:transparent;border:1px solid rgba(0,0,0,.2);border-radius:5px;font-family:'Fraunces',serif;text-transform:uppercase;letter-spacing:1px;font-size:12px;color:#4a443a;cursor:pointer}
  .sharegrid{font-size:20px;letter-spacing:3px;margin:14px 0 2px}

  .backlink{background:none;border:none;font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:1px;text-transform:uppercase;color:#a89e86;cursor:pointer;padding:6px 2px;opacity:.65;transition:opacity .15s,color .15s}
  .backlink:hover{opacity:1;color:#6b6457}
  .backlink:focus-visible{outline:2px solid var(--gold);outline-offset:2px;opacity:1}
  .backrow{margin-top:12px;display:flex}
  .actions{margin-top:18px;display:flex;justify-content:flex-end;align-items:center;gap:12px}
  .btn{font-family:'Fraunces',serif;font-weight:600;font-size:15px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--line);border-radius:6px;padding:13px 24px;background:var(--ink-3);color:var(--paper);transition:transform .12s,box-shadow .15s,background .15s}
  .btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px -10px rgba(0,0,0,.6);background:#1a584a}
  .btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .btn.go{background:linear-gradient(160deg,#d5b872,var(--gold) 55%,#a8894a);color:#241c0c;border-color:transparent;box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 2px 6px rgba(0,0,0,.3)}
  .btn.go:hover{background:linear-gradient(160deg,#e2c885,#cfae66 55%,#b39451)}
  .btn.big{font-size:18px;padding:16px 32px}

  .screen{background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:34px 28px;box-shadow:var(--shadow)}
  .kicker{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}

  .bigscore{font-family:'Fraunces',serif;font-weight:700;font-size:54px;line-height:1;margin:18px 0 2px;color:var(--gold)}
  .scoreline{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);margin-top:4px}


  /* ---------- Morgenavisen ---------- */

  .avis .ahoved{overflow-wrap:break-word;font-family:'Fraunces',serif;font-weight:700;font-size:clamp(24px,7vw,34px);letter-spacing:4px;text-align:center;text-transform:uppercase;border-bottom:3.5px double #221d13;padding-bottom:8px}
  .avis .adato{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:#6b6457;border-bottom:1px solid #c9bd9d;padding:6px 2px}
  .avis .arubrik{hyphens:auto;-webkit-hyphens:auto;overflow-wrap:break-word;font-family:'Fraunces',serif;font-weight:700;font-size:clamp(30px,8.8vw,46px);line-height:1.0;text-transform:uppercase;text-align:center;margin:18px 4px 10px}
  .avis .aunder{font-family:'Fraunces',serif;font-style:italic;font-size:clamp(14.5px,4.2vw,17px);line-height:1.45;text-align:center;color:#3f3a2e;margin:0 8px 14px}
  .avis .acitat{border-top:1px solid #c9bd9d;border-bottom:1px solid #c9bd9d;padding:11px 10px;font-size:13.5px;line-height:1.5;text-align:center;color:#33302a}
  .avis .acitat b{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#8f7433;display:block;margin-bottom:4px}
  .avis .anotits{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.6px;color:#6b6457;text-align:center;margin-top:11px}

  .protokol .psub{font-size:13px;color:#a9bcae;margin-bottom:12px}
  .prow{display:flex;align-items:center;gap:12px;padding:9px 10px;border:1px solid var(--line);border-radius:6px;margin-bottom:7px;background:rgba(255,255,255,.02)}

  .prow .pmark.w{color:var(--red)}

  .prow .pln{font-size:12px;color:var(--muted)}
  .gate-btn{background:transparent;border:2px solid var(--gold);color:var(--gold);font-family:'Fraunces',serif;text-transform:uppercase;letter-spacing:3px;font-size:16px;padding:14px 32px;border-radius:6px;cursor:pointer;transition:background .2s}

  .film-overlay.out{opacity:0}
  .film-card{opacity:0;transition:opacity .6s ease;text-align:center;padding:0 26px;max-width:760px;width:100%}
  .film-card.vis{opacity:1}
  .film-title{font-family:'Fraunces',serif;text-transform:uppercase;letter-spacing:4px;font-size:clamp(22px,6vw,40px);color:#f2ede2}

  button{touch-action:manipulation;-webkit-tap-highlight-color:transparent}

  /* ---------- Stauning-filmen ---------- */
  .ss-frame{position:absolute;inset:0;max-width:560px;margin:0 auto;overflow:hidden}
  .ss-slide{position:absolute;inset:0;opacity:0;transition:opacity .7s ease;display:flex;align-items:center;justify-content:center;padding:34px 30px;flex-direction:column;text-align:center}
  .ss-slide.vis{opacity:1}
  .ss-kicker{font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
  .ss-title{hyphens:auto;-webkit-hyphens:auto;overflow-wrap:break-word;font-family:'Fraunces',serif;font-weight:700;font-size:clamp(32px,9.5vw,54px);line-height:1.02;text-transform:uppercase;letter-spacing:1px;color:#f2ede2}
  .ss-sub{font-family:'Fraunces',serif;font-style:italic;font-size:clamp(14px,4.2vw,19px);letter-spacing:3px;text-transform:uppercase;color:#8fa596;margin-top:14px}
  .ss-body{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(19px,5.4vw,26px);line-height:1.5;color:#eef1ea;max-width:21ch;margin-top:4px}
  .ss-rule{width:46px;height:2px;background:var(--gold);opacity:.7;margin:22px auto 0}
  .ss-imgslide{padding:22px 18px;display:flex;flex-direction:column;justify-content:center}
  .ss-imgwrap{position:relative;flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;justify-content:center}
  .ss-cap{flex:0 0 auto;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);opacity:.92;margin-top:14px;line-height:1.5;text-align:center}
  .ss-imgwrap img{max-width:100%;max-height:100%;object-fit:contain;border:1px solid rgba(194,163,93,.5);border-radius:3px;box-shadow:0 20px 60px -18px rgba(0,0,0,.75);will-change:transform}
  .ss-kb{animation:sskb var(--kb,5s) ease-out both}
  @keyframes sskb{from{transform:scale(1.015)}to{transform:scale(1.075)}}
  .fx-scene{display:block;width:100%;max-width:520px;height:auto;margin:0 auto 22px;border:1px solid rgba(194,163,93,.45);border-radius:3px;box-shadow:0 18px 44px -18px rgba(0,0,0,.8)}
  .ss-video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000}
  .ss-bar{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(255,255,255,.08)}
  .ss-fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold-dk),var(--gold))}
  .ss-paused .ss-kb{animation-play-state:paused}
  .ss-pauselbl{position:absolute;top:18px;left:0;right:0;text-align:center;font-family:'Fraunces',serif;text-transform:uppercase;letter-spacing:4px;font-size:15px;color:#f2ede2;opacity:0;transition:opacity .2s;pointer-events:none}
  .ss-paused .ss-pauselbl{opacity:.9}
  @media (prefers-reduced-motion:reduce){.ss-kb{animation:none}}
</style>

<script>
/* ---------------------------------------------------------
   FLEX & TRYGHED · DEN DANSKE MODEL
   10 sager fra 1899 til i dag. Tre svar pr. sag, kun ét er sandt.
   Portrætter kan lægges i images/ (filnavne i PORTRAITS),
   spillet virker også uden billeder.
--------------------------------------------------------- */

const LEVELS = [
  { sag:"13", titel:"M\u00e5let er fuldt", based:"Danmark \u00b7 N\u00f8rre F\u00e6lled \u00b7 5. maj 1872",
    situation:"Du l\u00e6ste selv, at F\u00e6lleden blev ryddet med magt. Lederne kom i f\u00e6ngsel og Internationale blev forbudt. Statsmagten var overbevist om, at den havde knust den socialistiske arbejderbev\u00e6gelse i Danmark \u00e9n gang for alle.",
    spm:"Hvad blev den langsigtede virkning af nederlaget og forbuddet?",
    svar:[
      {t:"Forbuddet gav bagslag. Vreden over myndighedernes fremf\u00e6rd drev arbejderne ind i fagforeningerne i stedet, over 20 nye om \u00e5ret i midten af 1870'erne, og i 1874 samlede de sig i en f\u00e6lles centralbestyrelse.", ok:true},
      {t:"Bev\u00e6gelsen l\u00e5 reelt d\u00f8d i et par \u00e5rtier, og f\u00f8rst Septemberforliget i 1899 fik den p\u00e5 benene igen.", ok:false},
      {t:"Regeringen fortr\u00f8d hurtigt, oph\u00e6vede forbuddet og gav til geng\u00e6ld arbejderne strejkeret ved lov.", ok:false}
    ],
    forklaring:"Slaget knuste ikke bevægelsen, det organiserede den. I stedet for revolution valgte arbejderne fagforeningen og stemmesedlen, og fra 1876 blev grunden lagt til en egentlig partiorganisation ad demokratisk vej. Pio selv fik en marginal rolle og udvandrede til Amerika i 1877. Linjen fra F\u00e6lleden g\u00e5r direkte videre til Septemberforliget i 1899, hvor de samme parter i stedet for sabler brugte underskrifter." },

  { sag:"00", titel:"Jernkanslerens gulerod", based:"Tyskland \u00b7 Otto von Bismarck \u00b7 1883",
    situation:"Berlin i 1880'erne. Socialistloven har forbudt socialdemokratiske foreninger, m\u00f8der og aviser, men arbejderbev\u00e6gelsen vokser alligevel under jorden. Rigskansler Otto von Bismarck vil kn\u00e6kke socialismen, og han ved, at forbud og politi ikke er nok. Der skal ogs\u00e5 en gulerod p\u00e5 bordet.",
    spm:"Bismarck bek\u00e6mpede den voksende socialistiske arbejderbev\u00e6gelse med forbud og overv\u00e5gning. Hvad gjorde han samtidig?",
    svar:[
      {t:"Han indf\u00f8rte lovbestemte forsikringer ved sygdom, arbejdsulykker, invaliditet og alderdom og lagde dermed fundamentet til den moderne socialforsikringsstat.", ok:true},
      {t:"Han indf\u00f8rte en skattefinansieret folkepension, som alle tyskere havde ret til uanset arbejde og tidligere indbetalinger.", ok:false},
      {t:"Han gav fagforeningerne fuld frihed og inviterede socialdemokraterne med i regeringen.", ok:false}
    ],
    forklaring:"Sygeforsikringen kom i 1883, ulykkesforsikringen i 1884 og invalide- og alderdomsforsikringen i 1889. Planen var at tage vinden ud af sejlene p\u00e5 socialismen ved at binde arbejderne til staten, ikke til bev\u00e6gelsen. Forsikringerne blev st\u00e5ende, men planen fejlede: SPD blev Tysklands st\u00f8rste parti i 1912. Bismarcks model med obligatoriske statslige forsikringer blev den ene hovedvej i Europa. Danmark valgte i 1907 den anden vej, Ghent-modellen med frivillige a-kasser, som du m\u00f8der om lidt." },

  { sag:"01", titel:"Septemberforliget", based:"Danmark · DA & De samvirkende Fagforbund · 1899",
    situation:"Over tre måneders storlockout har lammet landet, og omkring 40.000 arbejdere er sendt hjem. Den 5. september 1899 sætter arbejdsgivere og fagbevægelse sig ved bordet i København og skriver under på det, der siden er blevet kaldt arbejdsmarkedets grundlov.",
    spm:"Hvad blev de to parter enige om i Septemberforliget?",
    svar:[
      {t:"De anerkendte hinanden gensidigt: arbejderne fik ret til at organisere sig, og arbejdsgiverne fik retten til at lede og fordele arbejdet.", ok:true},
      {t:"Staten fik ret til at fastsætte lønnen ved lov, hvis parterne ikke selv kunne blive enige.", ok:false},
      {t:"Strejker og lockouter blev forbudt en gang for alle, og alle tvister skulle afgøres ved domstolene.", ok:false}
    ],
    forklaring:"Efter over tre måneders storlockout indgik parterne den 5. september 1899 det forlig, der siden er blevet kaldt arbejdsmarkedets grundlov. Arbejdsgiverne anerkendte arbejdernes ret til at organisere sig og forhandle kollektivt, og fagbevægelsen anerkendte arbejdsgivernes ret til at lede og fordele arbejdet. Samtidig kom der spilleregler for varsling af konflikter. Princippet om, at parterne selv regulerer arbejdsmarkedet uden statslig indblanding, står stadig som fundamentet under den danske model." },

  { sag:"02", titel:"A-kassernes fødsel", based:"Danmark · Rigsdagen · 1907",
    situation:"Arbejdsløshed er i 1907 stadig et privat problem, og hjælpen afhænger af fagforeningernes egne kasser og sognerådets nåde. Rigsdagen skal nu beslutte, hvordan Danmark vil forsikre sine ledige.",
    spm:"Hvordan valgte Danmark at organisere arbejdsløshedsforsikringen i 1907?",
    svar:[
      {t:"Som frivillig forsikring i statsanerkendte a-kasser med tæt tilknytning til fagforeningerne og med tilskud fra staten.", ok:true},
      {t:"Som obligatorisk statslig forsikring, hvor alle lønmodtagere automatisk blev trukket i løn.", ok:false},
      {t:"Som ren kommunal hjælp, hvor sognerådet skønnede fra sag til sag, om den ledige var værdigt trængende.", ok:false}
    ],
    forklaring:"Med loven om anerkendte arbejdsløshedskasser fra 1907 valgte Danmark den såkaldte Ghent-model, opkaldt efter den belgiske by, hvor systemet først blev afprøvet. Forsikringen er frivillig, kasserne er fagligt afgrænsede og historisk tæt knyttet til fagforeningerne, og staten giver tilskud. Modellen gav fagbevægelsen en central rolle og regnes som en vigtig forklaring på den høje danske organisationsgrad. I dag findes Ghent-systemet i sin rene form kun i Danmark, Sverige, Finland og Island." },

  { sag:"03", titel:"Kanslergadeforliget", based:"Danmark · Thorvald Stauning · 1933",
    situation:"Du har netop set optakten. Verdenskrisen sender hver tredje fagforeningsmedlem ud i ledighed, landbruget bløder, og arbejdsgiverne har varslet en storlockout med krav om store lønnedgange. Natten til den 30. januar 1933 sidder Stauning for bordenden i sin lejlighed i Kanslergade, mens whiskyen står på bordet, og sent om natten falder aftalen på plads.",
    spm:"Filmen sluttede med, at forliget blev husket som et vendepunkt. Men hvad betød Kanslergadeforliget helt konkret for arbejdsmarkedet?",
    svar:[
      {t:"En varslet storlockout blev afværget, ved at overenskomsterne blev forlænget ved lov i et år.", ok:true},
      {t:"Fagbevægelsen blev sat under statslig administration, indtil krisen var overstået.", ok:false},
      {t:"Der blev indført lovbestemt mindsteløn for at holde hånden under de laveste lønninger.", ok:false}
    ],
    forklaring:"Natten mellem den 29. og 30. januar 1933 indgik Socialdemokratiet, Radikale og Venstre det bredeste kriseforlig i danmarkshistorien. Den varslede storlockout blev afværget ved at forlænge overenskomsterne ved lov i et år, kronen blev devalueret for at hjælpe landbruget, og Steinckes socialreform gjorde almisser til rettigheder. Samme nat blev Hitler udnævnt til rigskansler i Berlin. Forliget cementerede traditionen for brede kompromiser hen over midten, når krisen kradser." },

  { sag:"12", titel:"Ti \u00f8re og en musketered", based:"Danmark \u00b7 Overenskomstforhandlingerne \u00b7 1971",
    situation:"Kvinderne er str\u00f8mmet ud p\u00e5 arbejdsmarkedet, men overenskomsterne fasts\u00e6tter stadig deres l\u00f8n langt under m\u00e6ndenes. F\u00f8r forhandlingerne i 1971 har KAD's formand Edith Olsen indg\u00e5et en musketered med Anker J\u00f8rgensen fra Arbejdsmandsforbundet: De to lavtl\u00f8nsforbund st\u00e5r sammen om ligel\u00f8n. F\u00f8rste forslag kasseres, fordi det stadig har k\u00f8nsopdelte l\u00f8nsatser. S\u00e5 indkalder LO-formand Thomas Nielsen til et lille lukket m\u00f8de. Edith Olsen er ikke inviteret.",
    spm:"Hvad skete der p\u00e5 det lukkede m\u00f8de?",
    svar:[
      {t:"Anker J\u00f8rgensen accepterede en aftale, hvor ufagl\u00e6rte m\u00e6nd steg 20 \u00f8re i timen, mens kvinderne kun fik 10 \u00f8re, og f\u00f8rst et \u00e5r senere. Musketereden knak, og ligel\u00f8nnen faldt.", ok:true},
      {t:"Anker J\u00f8rgensen holdt fast i musketereden, og ligel\u00f8nnen kom igennem allerede i 1971.", ok:false},
      {t:"M\u00f8det endte uden aftale, og regeringen greb i stedet ind med en ligel\u00f8nslov samme \u00e5r.", ok:false}
    ],
    forklaring:"Med Ankers accept tippede flertallet i LO, og KAD stod alene med kravet. Blandt KAD's medlemmer stemte 32.935 nej til overenskomsten mod kun 7.560 ja, men de var bundet af de andre forbunds accept. Ligel\u00f8nnen kom f\u00f8rst ind i overenskomsterne i 1973, efter store demonstrationer og 130.000 underskrifter til forligsmanden, og i 1976 vedtog Folketinget Ligel\u00f8nsloven med alle partier undtagen Fremskridtspartiet bag. Den formelle ligel\u00f8n var i hus, men l\u00f8ngabet mellem m\u00e6nd og kvinder best\u00e5r den dag i dag." },

  { sag:"04", titel:"Sejret ad helvede til", based:"Danmark · Thomas Nielsen, LO · 1982",
    situation:"LO-formand Thomas Nielsen går efter 15 år på posten på talerstolen en sidste gang. Foran kongressen gør den bramfri formand status over fagbevægelsens march fra fattigdom til parcelhus, og så falder de ord, der skal blive stående.",
    spm:"Hvad mente Thomas Nielsen med, at fagbevægelsen havde sejret ad helvede til?",
    svar:[
      {t:"At bevægelsen havde nået sine mål i en grad, så medlemmernes velstand truede med at gøre den overflødig i deres egne øjne.", ok:true},
      {t:"At fagbevægelsen havde tabt kampen om velfærden og måtte starte forfra.", ok:false},
      {t:"At sejrene var købt for dyrt, fordi kontingentet var blevet alt for højt.", ok:false}
    ],
    forklaring:"Citatet faldt i afskedstalen på LO's kongres den 16. februar 1982 og blev straks udødeligt. Nielsen pegede på paradokset: Fagbevægelsen havde skaffet medlemmerne parcelhus, bil og charterferie i et omfang, så mange ikke længere følte, at de havde brug for bevægelsen. Sejren var så total, at den truede med at underminere sammenholdet. Sætningen citeres stadig, hver gang debatten om fagbevægelsens fremtid blusser op." },

  { sag:"14", titel:"Pension til de mange", based:"Danmark \u00b7 F\u00e6lleserkl\u00e6ringen \u00b7 1987-1993",
    situation:"Du har lige set historien: I slutningen af 1980'erne havde de fleste l\u00f8nmodtagere kun folkepension og ATP at se frem til, mens funktion\u00e6rer og akademikere havde deres egne ordninger. I 1987 satte regeringen, LO og DA sig sammen om F\u00e6lleserkl\u00e6ringen: Flere skulle sikres pension. Men hvordan skulle det ske?",
    spm:"Hvordan fik de fleste danske l\u00f8nmodtagere arbejdsmarkedspension?",
    svar:[
      {t:"Gennem overenskomsterne. Parterne aftalte ordningerne selv, f\u00f8rst for offentligt ansatte i 1989, s\u00e5 industrien i 1991 med indbetaling fra 1993, og derfra bredte de sig til resten af arbejdsmarkedet.", ok:true},
      {t:"Ved lov. Folketinget vedtog i 1990 en obligatorisk till\u00e6gspension oven p\u00e5 folkepensionen for alle l\u00f8nmodtagere.", ok:false},
      {t:"Gennem bankerne. Staten indf\u00f8rte et stort skattefradrag, der fik de fleste til selv at oprette private pensionsopsparinger.", ok:false}
    ],
    forklaring:"Det er den danske model i en n\u00f8ddeskal: Selv en velf\u00e6rdsopgave af den st\u00f8rrelse blev l\u00f8st ved bordet, ikke i Folketinget. F\u00e6lleserkl\u00e6ringen fra 1987 var startskuddet, gennembruddet kom for de offentligt ansatte i 1989, og med Industriens Pension i 1991 fulgte det private arbejdsmarked efter. I dag indbetales typisk 12 til 17 procent af l\u00f8nnen, og arbejdsmarkedspensionerne er en grundpille under den danske velf\u00e6rdsmodel med opsparinger p\u00e5 flere tusinde milliarder kroner." },

  { sag:"05", titel:"Flexicurity", based:"Danmark · Poul Nyrup Rasmussen · 1990'erne",
    situation:"Ledigheden har bidt sig fast over 10 procent, og udlandet undrer sig: Hvordan kan et land med nogle af verdens letteste fyringsregler samtidig have nogenlunde trygge lønmodtagere? I 1990'erne får én del af den danske model sit eget internationale navn.",
    spm:"Flexicurity er én af flere søjler i den danske model. Hvad består dens gyldne trekant af?",
    svar:[
      {t:"Fleksible regler for at hyre og fyre, et generøst sikkerhedsnet med dagpenge og en aktiv arbejdsmarkedspolitik.", ok:true},
      {t:"Lav skat på arbejde, høj mindsteløn og korte opsigelsesvarsler.", ok:false},
      {t:"Livslang ansættelsesgaranti, ret til efteruddannelse og tidlig pension.", ok:false}
    ],
    forklaring:"Begrebet flexicurity satte i 1990'erne et internationalt navn på en gammel dansk cocktail: liberale regler for at hyre og fyre, et forholdsvis generøst dagpengesystem og en aktiv arbejdsmarkedspolitik, der stiller krav om jobsøgning og opkvalificering. Men navnet er sat på bagefter, og modellen er kun én søjle i den danske model, ikke hele fundamentet. Fleksibiliteten kommer fra overenskomsterne, ikke fra staten, og trygheds-benet er blevet udhulet, siden dagpengereformen i 2010 halverede dagpengeperioden. EU og OECD roste længe modellen, men balancen, ordet lover, er i dag til diskussion." },

  { sag:"06", titel:"Mindstelønnen der ikke findes", based:"Danmark · Arbejdsmarkedets parter · Altid",
    situation:"En udenlandsk journalist ringer til Beskæftigelsesministeriet og beder om at få oplyst den danske mindsteløn. Der bliver stille i røret. Journalisten prøver igen: Hvem bestemmer, hvad en dansker mindst skal have i timen?",
    spm:"Hvem fastsætter mindstelønnen i Danmark?",
    svar:[

    const im = document.createElement('img');
    im.className = 'ss-video';
    im.src = PENSION_PANELER[i];
    im.alt = '';
    im.onerror = ()=>{ if(timer) clearTimeout(timer); visPanel(i+1); };
    /* tryk gaar straks til naeste panel */

    if(prev){ const p = prev; p.classList.remove('vis'); setTimeout(()=>{ if(p.parentNode) p.remove(); }, 720); }

    timer = setTimeout(()=> visPanel(i+1), PANEL_TID);

}

/* ---------- Bismarck-filmen (afspilles foer sag 00) ----------
   Laeg videoen i samme mappe som spillet under navnet bismarck.mp4
   (eller ret navnet nedenfor). Mangler filen, springes den over. */
const BISMARCK_KLIP = 'bismarck.mp4';

function bismarckInterlude(next){
  const ov = document.createElement('div');
  ov.className = 'film-overlay';
  ov.innerHTML = `<div class="ss-frame" id="bm-frame"></div>`;
  document.body.appendChild(ov);
  const skip = document.createElement('button');
  skip.className = 'film-skip'; skip.textContent = 'Videre \u25b8';
  /* skjult under normal afvikling, dukker op hvis noget haenger */
  skip.style.display = 'none';
  const nedfald = setTimeout(()=>{ skip.style.display = ''; }, 45000);
  document.body.appendChild(skip);
  const frame = ov.querySelector('#bm-frame');

  /* Opret og prim videoen i selve trykket, saa lyden faar lov paa iPhone */
  const bmv = document.createElement('video');
  bmv.className = 'ss-video';
  bmv.src = BISMARCK_KLIP;
  bmv.playsInline = true; bmv.setAttribute('playsinline','');
  bmv.preload = 'auto';
  try{
    bmv.muted = true;
    const p = bmv.play();
    if(p) p.then(()=>{ bmv.pause(); bmv.currentTime = 0; bmv.muted = false; }).catch(()=>{ bmv.muted = false; });
  }catch(_){ bmv.muted = false; }

  let done = false, prev = null;
  function finish(){
    if(done) return; done = true;
    frame.querySelectorAll('video').forEach(v=>{ try{ v.pause(); }catch(_){} });
    clearTimeout(nedfald);
    try{ next(); }catch(_){}          /* tegn naeste skaerm under overlayet */
    ov.classList.add('out');
    setTimeout(()=>{ ov.remove(); skip.remove(); }, 460);
  }
  skip.onclick = finish;

  function titleCard(){
    const el = document.createElement('div');
    el.className = 'ss-slide';
    el.innerHTML = `
      <div class="ss-body">Vi skal lige kortvarigt syd for gr\u00e6nsen med et lille filmklip.</div>
      <div class="ss-rule"></div>
      <button class="gate-btn" id="bm-start" style="margin-top:26px">Se filmklip \u25b8</button>`;
    frame.appendChild(el);
    requestAnimationFrame(()=>{ requestAnimationFrame(()=> el.classList.add('vis')); });
    prev = el;
    /* videoen startes af et rigtigt tryk, saa lyden altid faar lov paa iPhone */
    el.querySelector('#bm-start').onclick = ()=>{
      if(done) return;
      el.classList.remove('vis');
      setTimeout(()=>{ if(el.parentNode) el.remove(); spilVideo(); }, 500);
    };
  }

  function spilVideo(){
    if(done) return;
    const v = bmv;
    v.muted = false;
    try{ v.currentTime = 0; }catch(_){}
    let gaaet = false;
    const videre = ()=>{ if(gaaet) return; gaaet = true; finish(); };
    v.onended = videre;
    v.onerror = videre;
    v.onclick = ()=>{ if(v.paused){ v.play().catch(()=>{}); } else { v.pause(); } };
    frame.appendChild(v);
    v.play().catch(()=>{});
    setTimeout(()=>{ if(!done && v.paused && v.currentTime === 0) videre(); }, 12000);
  }

  titleCard();
}

  const pv = document.createElement('video');

  /* musik hen over hele forloebet, med fade ind og ud via Web Audio

  const musik = new Audio(PIO_MUSIK);
  musik.loop = false;   /* 30 sek, praecis forloebets laengde frem til Pio-videoen */
  let gain = null, actx = null;
  try{

    const kilde = actx.createMediaElementSource(musik);
    gain = actx.createGain();
    kilde.connect(gain); gain.connect(actx.destination);
    gain.gain.setValueAtTime(0.0001, actx.currentTime);
    gain.gain.linearRampToValueAtTime(1, actx.currentTime + 5.5);   /* fade ind */
    gain.gain.setValueAtTime(1, actx.currentTime + 26);

    if(actx.state === 'suspended') actx.resume();
  }catch(_){ gain = null; }
  musik.play().catch(()=>{});
  const musikVis = ()=>{ if(document.hidden){ musik.pause(); } else if(!done){ musik.play().catch(()=>{}); } };

  function musikUd(){

    if(gain && actx){
      try{
        gain.gain.cancelScheduledValues(actx.currentTime);
        gain.gain.setValueAtTime(gain.gain.value, actx.currentTime);
        gain.gain.linearRampToValueAtTime(0.0001, actx.currentTime + 4);
        setTimeout(()=>{ try{ musik.pause(); actx.close(); }catch(_){} }, 4200);
        return;
      }catch(_){}
    }
    /* reserve uden Web Audio: trinvis volumen (virker paa pc) */
    let v = musik.volume;
    const trin = setInterval(()=>{
      v -= 0.08;
      if(v <= 0){ clearInterval(trin); try{ musik.pause(); }catch(_){} }
      else { try{ musik.volume = v; }catch(_){} }
    }, 320);
  }

  function finish(){
    if(done) return; done = true;
    musikUd();
    document.removeEventListener('visibilitychange', musikVis);

    clearTimeout(nedfald);

      if(p) p.then(()=>{

    if(v.error){ playClip(i+1); return; }

function stauningInterlude(next){
  const ov = document.createElement('div');
  ov.className = 'film-overlay';
  ov.innerHTML = `
    <div class="ss-frame" id="ss-frame"></div>
    <div class="ss-pauselbl">Pause</div>
    <div class="ss-bar"><div class="ss-fill" id="ss-fill"></div></div>`;
  document.body.appendChild(ov);
  const skip = document.createElement('button');
  skip.className = 'film-skip'; skip.textContent = 'Videre \u25b8';
  /* skjult under normal afvikling, dukker op hvis noget haenger */
  skip.style.display = 'none';
  const nedfald = setTimeout(()=>{ skip.style.display = ''; }, 45000);
  document.body.appendChild(skip);

  const frame = ov.querySelector('#ss-frame');
  const fill = ov.querySelector('#ss-fill');
  const S = STAUNING_SLIDES;
  const TOTAL = S.reduce((a,s)=>a+s.dur,0);
  const starts = []; let acc = 0;
  for(const s of S){ starts.push(acc); acc += s.dur; }

  const audio = new Audio(STAUNING_MUSIK);
  audio.preload = 'auto';

  let prev=null, cur=-1, pausedAcc=0, pausedAt=0, paused=false, done=false, raf=null;
  const t0 = performance.now();

  function build(s){
    const el = document.createElement('div');
    if(s.k==='img'){
      el.className = 'ss-slide ss-imgslide';
      el.innerHTML = `<div class="ss-imgwrap"><img class="ss-kb" style="--kb:${s.dur/1000}s" src="${STAUNING_IMG[s.src]}" alt=""></div>`
        + (s.cap ? `<div class="ss-cap">${s.cap}</div>` : '');
    } else {
      el.className = 'ss-slide';
      let m = '';
      if(s.kicker) m += `<div class="ss-kicker">${s.kicker}</div>`;
      if(s.title)  m += `<div class="ss-title">${s.title}</div>`;
      if(s.sub)    m += `<div class="ss-sub">${s.sub}</div>`;
      if(s.body)   m += `<div class="ss-body">${s.body}</div>`;
      m += `<div class="ss-rule"></div>`;
      el.innerHTML = m;
    }
    return el;
  }

  function show(i){
    const el = build(S[i]);
    frame.appendChild(el);
    requestAnimationFrame(()=>{ requestAnimationFrame(()=> el.classList.add('vis')); });
    if(prev){ const p = prev; p.classList.remove('vis'); setTimeout(()=>{ if(p.parentNode) p.remove(); }, 720); }
    prev = el;
  }

  function finish(){
    if(done) return; done = true;
    if(raf) cancelAnimationFrame(raf);
    try{ audio.pause(); }catch(_){}
    document.removeEventListener('visibilitychange', visHandler);
    clearTimeout(nedfald);
    try{ next(); }catch(_){}          /* tegn naeste skaerm under overlayet */
    ov.classList.add('out');
    setTimeout(()=>{ ov.remove(); skip.remove(); }, 460);
  }

  function tick(){
    if(done || paused) return;
    const el = performance.now() - t0 - pausedAcc;
    fill.style.width = Math.min(el/TOTAL*100, 100) + '%';
    let idx = 0;
    for(let i=0;i<starts.length;i++){ if(el >= starts[i]) idx = i; }
    if(idx !== cur){ cur = idx; show(idx); }
    if(el >= TOTAL){ setTimeout(finish, 600); return; }
    raf = requestAnimationFrame(tick);
  }

  function doPause(){
    if(done || paused) return;
    paused = true; pausedAt = performance.now();
    if(raf) cancelAnimationFrame(raf);
    try{ audio.pause(); }catch(_){}
    ov.classList.add('ss-paused');
  }
  function doResume(){
    if(done || !paused) return;
    paused = false; pausedAcc += performance.now() - pausedAt;
    ov.classList.remove('ss-paused');
    try{ audio.play().catch(()=>{}); }catch(_){}
    raf = requestAnimationFrame(tick);
  }
  skip.onclick = finish;
  ov.addEventListener('click', ()=>{ paused ? doResume() : doPause(); });
  /* skifter man fane eller laaser telefonen, holder film og musik synkront pause */
  const visHandler = ()=>{ if(document.hidden) doPause(); };
  document.addEventListener('visibilitychange', visHandler);

  /* klik paa knappen der aabnede filmen taeller som brugerhandling, saa lyden maa spille */
  try{ audio.play().catch(()=>{}); }catch(_){}
  raf = requestAnimationFrame(tick);
}

/* Forsidens billedvifte: proev portraetterne fra images/, og fyld op med
   Kanslergade-tegningerne for dem der ikke er uploadet. Viser altid 5. */
function byggCollage(){
  const boks = document.getElementById('collage');
  if(!boks) return;

  const oensket = [
    {src:'images/bismarck.jpg', crop:true},        /* 1883 */
    {src:'images/septemberforliget.jpg', crop:true}, /* 1899 */
    {src:STAUNING_IMG[1], crop:false},             /* Kanslergade 1933, midterst */
    {src:'images/anker.jpg', crop:true},           /* ligeloen 1971 */
    {src:'images/eu.jpg', crop:true}               /* 2025 */
  ];
  const reserve = [STAUNING_IMG[2], STAUNING_IMG[0]];

  function loader(src){
    return new Promise(res=>{
      const im = new Image();
      im.onload = ()=> res(true);
      im.onerror = ()=> res(false);
      im.src = src;
    });
  }

  Promise.all(oensket.map(o=> loader(o.src))).then(fundet=>{
    let r = 0;
    const endelig = oensket.map((o,i)=>{
      if(fundet[i]) return o;
      return { src: reserve[r++ % reserve.length], crop:false };
    });
    boks.innerHTML = endelig.map((o,i)=>
      `<img class="p${i}${o.crop ? ' portrait-crop' : ''}" src="${o.src}" alt="">`
    ).join('');
  });
}

function titelsekvens(){
  /* Tre titelkort med musik, 10 sekunder i alt. Musikken startes i selve
     trykket paa Videre, saa lyden har lov paa iPhone. */
  const musik = new Audio('introquiz.mp3');
  musik.play().catch(()=>{});

  const ov = document.createElement('div');
  ov.className = 'film-overlay';
  ov.innerHTML = `<div class="ss-frame" id="tit-frame"></div>`;
  document.body.appendChild(ov);
  const skip = document.createElement('button');
  skip.className = 'film-skip'; skip.textContent = 'Videre \u25b8';
  /* skjult under normal afvikling, dukker op hvis noget haenger */
  skip.style.display = 'none';
  const nedfald = setTimeout(()=>{ skip.style.display = ''; }, 45000);
  document.body.appendChild(skip);
  const frame = ov.querySelector('#tit-frame');

  const KORT = [
    {dur:3700, html:`<div class="ss-title" style="font-size:clamp(26px,7.4vw,44px);hyphens:none;-webkit-hyphens:none">KlosKlos og Reagan Production</div><div class="ss-sub">pr\u00e6senterer</div>`},
    {dur:3700, html:`<div class="ss-sub">i samarbejde med</div><div class="ss-title" style="font-size:clamp(26px,7.4vw,44px);hyphens:none;-webkit-hyphens:none">Factum Labs og Jyske Penge</div>`},
    {dur:3600, html:`<div class="ss-title" style="font-size:clamp(38px,11vw,64px)">Forlig f\u00f8r daggry</div><div class="ss-rule"></div>`}
  ];

  let done = false, prev = null;
  function finish(){
    if(done) return; done = true;
    try{ musik.pause(); }catch(_){}
    clearTimeout(nedfald);
    try{ intro(); }catch(_){}         /* tegn sagsmappen under overlayet */
    ov.classList.add('out');
    setTimeout(()=>{ ov.remove(); skip.remove(); }, 460);
  }
  skip.onclick = finish;

  function vis(i){
    if(done) return;
    if(i >= KORT.length){ finish(); return; }
    /* tegn kortet foerst naar det forrige er tonet helt ud, saa to kort
       aldrig staar oven i hinanden midt i et krydsfade */
    const tegn = ()=>{
      if(done) return;
      const el = document.createElement('div');
      el.className = 'ss-slide';
      el.innerHTML = KORT[i].html;
      frame.appendChild(el);
      requestAnimationFrame(()=>{ requestAnimationFrame(()=> el.classList.add('vis')); });
      prev = el;
      setTimeout(()=> vis(i+1), KORT[i].dur);
    };
    if(prev){
      const p = prev; prev = null;
      p.classList.remove('vis');
      setTimeout(()=>{ if(p.parentNode) p.remove(); tegn(); }, 500);
    } else {
      tegn();
    }
  }
  vis(0);
}

function startGame(){
  state = { i:0, history:[], rigtige:0, slots:[], started:true, gaerDone:false, stauningDone:false, ligelonDone:false, faelledDone:false, bismarckDone:false, pensionDone:false, deck:FASTE.map(s=> LEVELS.findIndex(l=>l.sag===s)) };

  renderRecord();
  /* Foerste punkt er Faelleden, saa scenen sættes inden det foerste spoergsmaal */
  const foerst = ()=>{
    if(!state.faelledDone && LEVELS[state.deck[0]].sag === "13"){
      state.faelledDone = true;
      faelledInterlude(showCase);
    } else {
      showCase();
    }
  };
  foerst();
}

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function parseBased(b){ const p=b.split('\u00b7').map(s=>s.trim()); return {land:p[0]||'', person:p[1]||'', aar:p[p.length-1]||''}; }

function showCase(){
  const lv = LEVELS[state.deck[state.i]];
  const b = parseBased(lv.based);
  const nr = String(state.i+1).padStart(2,'0');
  const ord = shuffle([0,1,2]);
  state.slots = ord;
  caseCount.textContent = 'PUNKT ' + (state.i+1) + ' / ' + RUNDE + ' \u00b7 kl. ' + TIDER[state.i];
  setUr(TIDER[state.i]);
  renderRecord();

  const buttons = ord.map((optIdx,slot)=>{
    const o = lv.svar[optIdx];
    return `<button class="choice" data-slot="${slot}"><span class="key">${SLOTS[slot]}</span><span>${o.t}</span></button>`;
  }).join('');

  app.innerHTML = `
    <div class="panel fade">
      <div class="card has-portrait">
        ${PORTRAITS[lv.sag] ? `<div class="portrait"><img src="images/${PORTRAITS[lv.sag]}" alt="${b.person}" onerror="this.parentElement.style.display='none';this.closest('.card').classList.remove('has-portrait')"></div>` : ''}
        <div class="meta">Punkt ${nr} \u00b7 nattens dagsorden</div>
        <div class="country">${b.land}</div>
        <h2 class="case-title">${lv.titel}</h2>
        <div class="cardsub">${b.person} \u00b7 ${b.aar}</div>
        <p class="situation">${lv.situation}</p>
        <div class="prompt">Sp\u00f8rgsm\u00e5l</div>
        <p class="question">${lv.spm}</p>
        <div class="choices">${buttons}</div>
        ${state.i > 0 ? '<div class="backrow"><button class="backlink" id="backbtn">\u2039 Forrige sag</button></div>' : ''}
      </div>
    </div>`;
  window.scrollTo(0, 0);
  app.querySelectorAll('.choice').forEach(b=>{ b.onclick = ()=> choose(parseInt(b.dataset.slot,10)); });
  /* A/B/C eller 1/2/3 paa tastatur */
  window.onkeydown = (e)=>{
    const map = {a:0, b:1, c:2, '1':0, '2':1, '3':2};
    const k = (e.key || '').toLowerCase();
    if(k in map){ const btns = app.querySelectorAll('.choice'); if(btns[map[k]]) btns[map[k]].click(); }
  };
  const bb = document.getElementById('backbtn');
  if(bb) bb.onclick = ()=>{
    state.i--;
    state.history[state.i] = undefined;
    tally(); renderRecord(); showCase();
  };
}

function choose(slot){
  const lv = LEVELS[state.deck[state.i]];
  const b = parseBased(lv.based);
  const nr = String(state.i+1).padStart(2,'0');
  const picked = lv.svar[ state.slots[slot] ];
  const good = !!picked.ok;
  const correct = lv.svar.find(o=>o.ok);
  const q = CITATER[lv.sag];

  state.history[state.i] = good;
  tally();
  renderRecord();

  app.innerHTML = `
    <div class="panel fade">
      <div class="card has-portrait">
        <div class="stamp land" style="${good?'color:var(--green)':''}">${good ? 'Enighed' : 'Varsel'}</div>

        <h2 class="case-title">${lv.titel}</h2>
        <div class="verdict ${good?'good':'bad'}"><span class="dot"></span>${good ? 'Rigtigt \u00b7 ro om bordet' : 'Forkert \u00b7 konfliktvarsel'}</div>
        ${good ? '' : `<div class="vsub">Du svarede: ${picked.t}</div>`}
        <div class="answer"><span class="alab">Det rigtige svar</span>${correct.t}</div>
        <div class="truth"><span class="lab">S\u00e5dan gik det i virkeligheden \u00b7 ${b.aar}</span>${lv.forklaring}</div>
        <div class="qbox"><div class="qlab">Til eftertanke</div><div class="qt">${q.t}</div><div class="qk">${q.k}</div></div>
        <div class="actions" id="act"></div>
      </div>
    </div>`;

  window.scrollTo(0, 0);
  const act = document.getElementById('act');
  act.style.justifyContent = 'space-between';
  /* Enter gaar videre */
  window.onkeydown = (e)=>{ if(e.key === 'Enter'){ const n = document.getElementById('next'); if(n) n.click(); } };
  const backHtml = `<button class="backlink" id="reanswer">\u2039 Svar om</button>`;
  if(state.i === RUNDE - 1){
    act.innerHTML = backHtml + `<button class="btn go big" id="next">Se hvem der ringer \u25b8</button>`;
    document.getElementById('next').onclick = ()=> ending();
  } else {
    {
      const nextLv = LEVELS[state.deck[state.i+1]];
      /* Foer sag 03 (Kanslergadeforliget) vises Stauning-filmen */
      if(nextLv && nextLv.sag === "14" && !state.pensionDone){
        act.innerHTML = backHtml + `<button class="btn go big" id="next">\ud83d\udcd6 Historien om pensionen \u25b8</button>`;
        document.getElementById('next').onclick = ()=>{
          state.pensionDone = true;
          tegneserieInterlude(()=>{ state.i++; showCase(); });
        };
      } else if(nextLv && nextLv.sag === "00" && !state.bismarckDone){
        act.innerHTML = backHtml + `<button class="btn go big" id="next">Videre \u25b8</button>`;
        document.getElementById('next').onclick = ()=>{
          state.bismarckDone = true;
          bismarckInterlude(()=>{ state.i++; showCase(); });
        };
      } else if(nextLv && nextLv.sag === "12" && !state.ligelonDone){
        act.innerHTML = backHtml + `<button class="btn go big" id="next">Videre \u25b8</button>`;
        document.getElementById('next').onclick = ()=>{
          ligelonIntro(()=>{ state.i++; showCase(); });

        act.innerHTML = backHtml + `<button class="btn go big" id="next">Videre \u25b8</button>`;
        let gstart = false;
        document.getElementById('next').onclick = ()=>{
          if(gstart) return;
          gstart = true;
          gaerIntro(()=>{ state.i++; showCase(); });
        };
      } else if(nextLv && nextLv.sag === "03" && !state.stauningDone){
        act.innerHTML = backHtml + `<button class="btn go big" id="next">Videre \u25b8</button>`;
        let startet = false;
        document.getElementById('next').onclick = ()=>{
          if(startet) return;        /* dobbeltklik maa ikke starte sekvensen to gange */
          startet = true;
          state.stauningDone = true;
          stauningInterlude(()=>{ state.i++; showCase(); });
        };
      } else {
        act.innerHTML = backHtml + `<button class="btn big" id="next">N\u00e6ste sag \u25b8</button>`;
        document.getElementById('next').onclick = ()=>{ state.i++; showCase(); };
      }
    }
  }
  const ra = document.getElementById('reanswer');
  if(ra) ra.onclick = ()=>{
    state.history[state.i] = undefined;
    tally(); renderRecord(); showCase();
  };
}

function ending(){
  const r = state.rigtige;  const grid = state.history.map(h=> h ? '\u2705' : '\u274c').join('');
  const bestod = r >= BESTAAET;
  const udfald = bestod ? 'Historisk overenskomst' : 'Strejke og lockout';

  /* Morgenavisens forside afhaenger af nattens resultat */
  let rubrik, under, citat;
  if(r === RUNDE){
    rubrik = 'MIRAKLET I FORLIGS\u00adINSTITUTIONEN';
    under = 'Ukendt m\u00e6gler l\u00f8ser samtlige ' + RUNDE + ' knuder p\u00e5 \u00e9n nat. DI og CO-industri underskrev kl. 05:52. Eksperter m\u00e5ll\u00f8se.';
    citat = '<b>Simon Eriksen, formand, DI</b>\u201dJeg s\u00e5 Risette smile i nat. Det var ubehageligt, men historisk.\u201d';
  } else if(bestod && r >= 10){
    rubrik = 'HISTORISK AFTALE I HUS F\u00d8R DAGGRY';
    under = 'Efter en lang nat i Forligsinstitutionen gav DI og CO-industri h\u00e5nd kl. 05:52. En n\u00e6sten ukendt m\u00e6gler f\u00e5r \u00e6ren for gennembruddet.';
    citat = '<b>Risette Larsen, forkvinde, CO-industri</b>\u201dSimon h\u00e6ldte faktisk kaffe op til mig kl. fire. S\u00e5 vidste jeg, at det nok skulle g\u00e5.\u201d';
  } else if(bestod){
    rubrik = 'FORLIG I ALLERSIDSTE \u00d8JEBLIK';
    under = 'Aftalen kom i hus f\u00e5 minutter f\u00f8r solopgang. Enkelte knuder m\u00e5tte if\u00f8lge kilder l\u00f8ses med tape, men den holder.';
    citat = '<b>Kilde t\u00e6t p\u00e5 forhandlingerne</b>\u201dM\u00e6gleren var ikke n\u00f8dvendigvis den skarpeste i lokalet, men absolut den mest udholdende.\u201d';
  } else if(r >= 4){
    rubrik = 'STORKONFLIKT!';
    under = 'Forhandlingerne p\u00e5 industriens omr\u00e5de br\u00f8d sammen kl. 05:47. Strejke og lockout tr\u00e6der i kraft fra i dag. Landet g\u00e5r i st\u00e5.';
    citat = '<b>DI og CO-industri, f\u00e6lles udtalelse</b>\u201dVi er for f\u00f8rste gang nogensinde helt enige: Aldrig igen den m\u00e6gler.\u201d';
  } else {
    rubrik = 'STORKONFLIKT! LANDET LUKKER';
    under = 'Nattens forhandlinger endte i \u00e5bent sk\u00e6nderi om, hvorn\u00e5r Kanslergadeforliget blev indg\u00e5et. Alt g\u00e5r i st\u00e5 fra i morges.';
    citat = '<b>Risette Larsen, forkvinde, CO-industri</b>\u201dM\u00e6gleren troede, Septemberforliget var en slags h\u00f8stfest. S\u00e5 rejste Simon og jeg os. Sammen, faktisk.\u201d';
  }
  const notits = bestod ? 'Side 9: Murerne f\u00e5r omsider deres time \u00b7 Vejret: Daggry, siden opklaring' : 'Side 2: S\u00e5dan hamstrer du kaffe \u00b7 Vejret: M\u00f8rke skyer';

  caseCount.textContent = 'KL. 06:00 \u00b7 DAGGRY';
  setUr('06:00');
  recordEl.style.display = 'flex';
  renderRecord();
  const protokol = state.history.map((hv,i)=>{
    const lv = LEVELS[state.deck[i]];
    const b = parseBased(lv.based);
    return `<div class="prow">
      <div class="pmark ${hv?'r':'w'}">${hv?'\u2713':'\u2717'}</div>
      <div><div class="pnm">${lv.titel}</div><div class="pln">${b.person} \u00b7 ${b.aar}</div></div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="panel fade">
      <div class="avis">
        <div class="ahoved">Morgenposten</div>
        <div class="adato"><span>Mandag morgen</span><span>kl. 06:12</span><span>25 \u00f8re</span></div>
        <div class="arubrik">${rubrik}</div>
        <div class="aunder">${under}</div>
        <div class="acitat">${citat}</div>
        <div class="anotits">${notits}</div>
      </div>
    </div>
    <div class="screen fade" style="text-align:center">
      <div class="phone">\ud83d\udcde</div>
      <div class="kicker">Kl. 06:00 \u00b7 ${udfald}</div>
      <div class="bigscore">${r}<span style="font-size:26px;color:var(--muted)">/${RUNDE}</span></div>
      <div class="scoreline">knuder l\u00f8st ved nattens bord</div>
      <div class="sharegrid">${grid}</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px">
        <button class="btn go" id="share">Del dit resultat</button>
        <button class="btn" id="again">Pr\u00f8v igen \u25b8</button>
      </div>

      <div class="protokol">
        <h3>Protokollen</h3>
        <div class="psub">Dine ti sager, som de blev f\u00f8rt til protokols.</div>
        ${protokol}
      </div>
    </div>`;
  window.scrollTo(0, 0);
  document.getElementById('again').onclick = startGame;
  document.getElementById('share').onclick = ()=> showShareMenu(r, grid);
}

function showShareMenu(r, grid){
  const text = 'Forlig før daggry: En arbejdsmarkedshistorisk quiz\n' + (r >= BESTAAET ? 'Historisk overenskomst\n' : 'Strejke og lockout\n') + r + '/' + RUNDE + '\n' + grid + '\nKan du sl\u00e5 mig? ' + location.href;
  const eText = encodeURIComponent(text);
  const eUrl = encodeURIComponent(location.href);
  const modal = document.createElement('div');
  modal.className = 'share-modal';
  modal.innerHTML = `
    <div class="share-box">
      <h3>Del dit resultat</h3>
      <div class="share-list">
        <a class="share-btn" href="https://www.facebook.com/sharer/sharer.php?u=${eUrl}" target="_blank" rel="noopener"><span class="ico fb">f</span>Facebook</a>
        <a class="share-btn" href="https://twitter.com/intent/tweet?text=${eText}" target="_blank" rel="noopener"><span class="ico x">\ud835\udd4f</span>X</a>
        <a class="share-btn" href="https://wa.me/?text=${eText}" target="_blank" rel="noopener"><span class="ico wa">\u2706</span>WhatsApp</a>
        <a class="share-btn" href="https://t.me/share/url?url=${eUrl}&text=${eText}" target="_blank" rel="noopener"><span class="ico tg">\u2708</span>Telegram</a>
        <button class="share-btn" id="share-copy"><span class="ico cp">\u2398</span>Kopi\u00e9r resultat</button>
      </div>
      <button class="share-close" id="share-close">Luk</button>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e=>{ if(e.target===modal) modal.remove(); });
  document.getElementById('share-close').onclick = ()=> modal.remove();
  document.getElementById('share-copy').onclick = ()=>{
    navigator.clipboard.writeText(text).then(()=>{
      const b = document.getElementById('share-copy');
      b.innerHTML = '<span class="ico cp">\u2713</span>Kopieret!';
    });
  };
}

/* Til test: previewEnding(7) i konsollen viser slutsk\u00e6rmen med en given score */
function previewEnding(fakeScore){
  state.deck = FASTE.map(s=> LEVELS.findIndex(l=>l.sag===s));
  state.rigtige = fakeScore;
  state.history = [...Array(RUNDE)].map((_,i)=> i < fakeScore);
  ending();
}

forside();
</script>
