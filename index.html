<style>
  /* ============ DET GRØNNE BORD ============
     Flaskegrøn mødebordsfilt, messing og segl-rødt.
     Variabelnavnene er bevaret fra v1, kun værdierne
     (og enkelte detaljer) er skiftet ud. */
  :root{
    --ink:#0e3b2e;   --ink-2:#0b2f25;  --ink-3:#14483a;   /* filten */
    --paper:#f6f1e2; --paper-2:#ece4cf;                    /* dokumenterne */
    --text:#26221a;  --muted:#9db3a6;  --muted-paper:#7d745d;
    --green:#3d8a60; --green-dk:#2e6b4f;                   /* rigtigt svar */
    --red:#b03a2e;   --red-dk:#8c2d24;                     /* seglrød */
    --gold:#c2a35d;  --gold-dk:#8f7433;                    /* messing */
    --line:rgba(194,163,93,.28); --line-paper:#d8d0ba;
    --shadow:0 28px 55px -20px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:
      radial-gradient(900px 480px at 50% -120px, rgba(255,241,205,.13) 0%, transparent 65%),
      radial-gradient(130% 115% at 50% 45%, transparent 55%, rgba(0,0,0,.40) 100%),
      url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC44IiBudW1PY3RhdmVzPSIyIiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PGZlQ29sb3JNYXRyaXggdHlwZT0ic2F0dXJhdGUiIHZhbHVlcz0iMCIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIiBmaWx0ZXI9InVybCgjbikiIG9wYWNpdHk9IjAuNSIvPjwvc3ZnPg=="),
      var(--ink);
    background-blend-mode:normal,normal,soft-light,normal;
    color:var(--paper);min-height:100%;
    display:flex;flex-direction:column;align-items:center;
    padding:18px 16px 40px;-webkit-font-smoothing:antialiased;
  }
  .stage{width:100%;max-width:640px;display:flex;flex-direction:column;gap:14px}

  header.bar{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:2px 4px 8px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:baseline;gap:10px;line-height:1}
  .brand .logo{font-family:'Fraunces',serif;font-weight:700;font-size:22px;letter-spacing:.5px;text-transform:uppercase}
  .brand .logo .amp{color:var(--gold);font-style:italic}
  .brand .tag{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px}
  .casecount{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold);letter-spacing:1px;white-space:nowrap}

  .record{display:flex;align-items:center;gap:10px;background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:11px 14px}
  .segs{display:flex;gap:5px;flex:1}
  .seg{flex:1;height:18px;border-radius:4px;background:#07231b;display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:#fff;line-height:1;transition:background .4s,box-shadow .2s}
  .seg.r{background:var(--green)} .seg.w{background:var(--red)}
  .seg.cur{box-shadow:0 0 0 2px var(--gold)}
  .rec-lbl{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#b7c6bc;white-space:nowrap;letter-spacing:.5px}
  .rec-lbl b{color:var(--gold)}

  .panel{position:relative}
  .card{background:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC44IiBudW1PY3RhdmVzPSIyIiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PGZlQ29sb3JNYXRyaXggdHlwZT0ic2F0dXJhdGUiIHZhbHVlcz0iMCIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIiBmaWx0ZXI9InVybCgjbikiIG9wYWNpdHk9IjAuNSIvPjwvc3ZnPg=="),linear-gradient(180deg,var(--paper) 0%,var(--paper-2) 100%);background-blend-mode:soft-light;color:var(--text);border-radius:4px;padding:26px 24px 24px;position:relative;overflow:hidden;border:1px solid var(--line-paper);
    transform:rotate(-.3deg);
    box-shadow:0 1px 0 rgba(0,0,0,.05), 0 12px 0 -6px var(--paper-2), 0 13px 0 -5px rgba(0,0,0,.22), var(--shadow)}
  .card > *{position:relative;z-index:1}
  .card > .stamp{position:absolute;z-index:3}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:7px;background:repeating-linear-gradient(90deg,var(--red) 0 30px,#f2ece0 30px 38px);opacity:.9;z-index:2}
  .card::after{content:"DET GR\00d8NNE BORD";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-20deg);font-family:'Fraunces',serif;font-weight:700;font-size:clamp(34px,10vw,58px);letter-spacing:7px;color:rgba(14,59,46,.07);white-space:nowrap;pointer-events:none;z-index:0}
  .stamp{position:absolute;top:16px;right:-4px;transform:rotate(-6deg);font-family:'Permanent Marker','Fraunces',serif;font-weight:400;font-size:16px;letter-spacing:1.2px;text-transform:uppercase;color:var(--red);padding:3px 12px;opacity:.85;border:none;background:transparent}
  .stamp::before{content:"";position:absolute;left:-3px;right:-5px;top:-2px;bottom:-1px;border:2.5px solid var(--red);border-radius:9px 4px 10px 5px;transform:rotate(1.4deg) skewX(-2deg);opacity:.85;pointer-events:none}
  .stamp::after{content:"";position:absolute;left:1px;right:-1px;top:1px;bottom:2px;border-top:2px solid var(--red);border-right:1.5px solid var(--red);border-radius:5px 9px 3px 7px;transform:rotate(-0.8deg);opacity:.45;pointer-events:none}
  .portrait{position:absolute;top:18px;left:18px;width:64px;height:64px;border-radius:50%;overflow:hidden;border:3px solid #fbf7ea;box-shadow:0 4px 12px rgba(0,0,0,.3),0 0 0 1px rgba(143,116,51,.5);background:#2c2823;z-index:2}
  .portrait img{width:100%;height:100%;object-fit:cover;display:block;filter:contrast(1.05) sepia(.15) saturate(.85)}
  .card.has-portrait .meta,.card.has-portrait .case-title,.card.has-portrait .country,.card.has-portrait .cardsub{padding-left:78px}
  .stamp.land{animation:stampIn .55s cubic-bezier(.18,1.25,.3,1) both}
  @keyframes stampIn{0%{opacity:0;transform:rotate(7deg) scale(2.7)}55%{opacity:.85;transform:rotate(7deg) scale(.9)}75%{transform:rotate(7deg) scale(1.05)}100%{opacity:.78;transform:rotate(7deg) scale(1)}}
  .meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted-paper);letter-spacing:1px;text-transform:uppercase;margin:6px 0 2px}
  .case-title{font-family:'Fraunces',serif;font-weight:700;font-size:clamp(25px,6.6vw,36px);line-height:1.04;text-transform:uppercase;letter-spacing:.3px;margin:2px 0 12px;color:#221c10}
  .situation{font-size:15.5px;line-height:1.55;color:#2c2823}
  .question{font-size:16px;line-height:1.45;color:#2c2823;font-weight:500;margin:0 0 14px}
  .answer{margin:4px 0 0;padding:12px 14px;background:rgba(46,107,79,.12);border-left:3px solid var(--green-dk);border-radius:4px;font-size:14.5px;line-height:1.5;color:#2a2620}
  .answer .alab{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--green-dk);display:block;margin-bottom:6px}
  .prompt{font-family:'Fraunces',serif;font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:#6b6457;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
  .prompt::after{content:"";flex:1;height:1px;background:var(--line-paper)}

  .choices{display:flex;flex-direction:column;gap:10px}
  .choice{text-align:left;width:100%;cursor:pointer;background:#fbf7ea;border:1.5px solid var(--line-paper);border-radius:6px;padding:14px 16px;display:flex;gap:13px;align-items:flex-start;font-family:inherit;font-size:14.5px;line-height:1.45;color:#2a2620;transition:transform .12s ease,border-color .15s,background .15s,box-shadow .15s}
  .choice:hover{transform:translateY(-1px);border-color:#b3a67f;background:#fff;box-shadow:0 6px 16px -10px rgba(0,0,0,.4)}
  .choice:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .choice .key{font-family:'Fraunces',serif;font-weight:700;font-size:17px;width:30px;height:30px;flex:none;border-radius:50%;display:grid;place-items:center;background:linear-gradient(160deg,#d5b872,var(--gold) 55%,var(--gold-dk));color:#241c0c;box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 1px 2px rgba(0,0,0,.25)}

  .verdict{display:flex;align-items:center;gap:11px;font-family:'Fraunces',serif;font-weight:700;font-size:clamp(23px,6.6vw,29px);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .verdict .dot{width:15px;height:15px;border-radius:50%;flex:none}
  .verdict.good{color:var(--green-dk)} .verdict.good .dot{background:var(--green)}
  .verdict.bad{color:var(--red-dk)} .verdict.bad .dot{background:var(--red)}
  .vsub{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.5px;color:#6b6457;margin-bottom:14px}
  .truth{margin-top:16px;padding:13px 15px;background:rgba(176,58,46,.09);border-left:3px solid var(--red);border-radius:4px;font-size:13.5px;line-height:1.5;color:#4a443a}
  .truth .lab{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--red-dk);display:block;margin-bottom:7px}
  .country{display:inline-block;font-family:'Fraunces',serif;font-weight:700;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--paper);background:var(--ink-3);padding:4px 11px;border-radius:4px;margin:2px 0 9px}
  .cardsub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted-paper);letter-spacing:.5px;margin:-4px 0 14px}
  .cover-title{font-family:'Fraunces',serif;font-weight:700;font-size:clamp(33px,8.6vw,50px);line-height:1;text-transform:uppercase;letter-spacing:.5px;color:#221c10;margin:6px 0 2px}
  .cover-title .amp{color:var(--red);font-style:italic}
  .cover-sub{font-family:'Fraunces',serif;font-weight:400;font-style:italic;font-size:clamp(15px,4vw,19px);letter-spacing:4px;text-transform:uppercase;color:var(--muted-paper);margin-bottom:16px}
  .dossier{border-top:1px solid var(--line-paper);border-bottom:1px solid var(--line-paper);padding:12px 0;margin:0 0 16px;display:flex;flex-direction:column;gap:8px}
  .drow{display:flex;gap:12px;align-items:center;font-size:13.5px}
  .dk{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted-paper);width:92px;flex:none}
  .dv{color:#2c2823}
  .redact{display:inline-block;height:15px;background:#26221a;border-radius:2px}
  .qbox{margin-top:14px;padding:12px 15px;background:rgba(194,163,93,.16);border-left:3px solid var(--gold);border-radius:4px}
  .qbox .qlab{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold-dk);margin-bottom:5px}
  .qbox .qt{font-family:'Fraunces',serif;font-size:15px;line-height:1.55;color:#3f3a31;font-style:italic}
  .qbox .qk{margin-top:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.4px;color:var(--muted-paper)}
  .share-modal{position:fixed;inset:0;background:rgba(3,19,13,.78);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px)}
  .share-box{background:var(--paper);border-radius:10px;padding:22px;max-width:340px;width:100%;box-shadow:0 20px 46px rgba(0,0,0,.5)}
  .share-box h3{font-family:'Fraunces',serif;text-transform:uppercase;letter-spacing:1.5px;font-size:16px;margin:0 0 14px;color:#211d18}
  .share-list{display:flex;flex-direction:column;gap:8px}
  .share-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:6px;font-family:'Inter',sans-serif;font-size:14px;color:#2c2823;cursor:pointer;text-align:left;text-decoration:none}
  .share-btn:hover{background:#f5efe0;border-color:rgba(0,0,0,.25)}
  .share-btn .ico{width:24px;height:24px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:5px;color:#fff;font-weight:700;font-size:12px}
  .share-btn .ico.fb{background:#1877f2}
  .share-btn .ico.x{background:#000}
  .share-btn .ico.wa{background:#25d366}
  .share-btn .ico.tg{background:#229ed9}
  .share-btn .ico.cp{background:var(--gold);color:#1a1710}
  .share-close{margin-top:14px;width:100%;padding:10px;background:transparent;border:1px solid rgba(0,0,0,.2);border-radius:5px;font-family:'Fraunces',serif;text-transform:uppercase;letter-spacing:1px;font-size:12px;color:#4a443a;cursor:pointer}
  .sharegrid{font-size:20px;letter-spacing:3px;margin:14px 0 2px}

  .actions{margin-top:18px;display:flex;justify-content:flex-end}
  .btn{font-family:'Fraunces',serif;font-weight:600;font-size:15px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--line);border-radius:6px;padding:13px 24px;background:var(--ink-3);color:var(--paper);transition:transform .12s,box-shadow .15s,background .15s}
  .btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px -10px rgba(0,0,0,.6);background:#1a584a}
  .btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .btn.go{background:linear-gradient(160deg,#d5b872,var(--gold) 55%,#a8894a);color:#241c0c;border-color:transparent;box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 2px 6px rgba(0,0,0,.3)}
  .btn.go:hover{background:linear-gradient(160deg,#e2c885,#cfae66 55%,#b39451)}
  .btn.big{font-size:18px;padding:16px 32px}

  .screen{background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:34px 28px;box-shadow:var(--shadow)}
  .kicker{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
  .hero-title{font-family:'Fraunces',serif;font-weight:700;font-size:clamp(33px,9.4vw,54px);line-height:.98;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .hero-title .amp{color:var(--gold);font-style:italic}
  .hero-sub{font-family:'Fraunces',serif;font-weight:400;font-style:italic;font-size:clamp(16px,4vw,20px);letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:22px}
  .lede{font-size:15.5px;line-height:1.6;color:#d5ddd6;max-width:54ch}
  .lede + .lede{margin-top:12px}
  .lede strong{color:var(--paper)}
  .phone{font-size:46px;line-height:1;margin-bottom:8px;animation:ring 1.6s ease-in-out infinite}
  @keyframes ring{0%,60%,100%{transform:rotate(0)}10%,30%,50%{transform:rotate(-12deg)}20%,40%{transform:rotate(12deg)}}

  .rank-badge{font-family:'Fraunces',serif;font-weight:700;font-size:clamp(25px,6.6vw,38px);text-transform:uppercase;letter-spacing:.5px;margin:6px 0 10px;line-height:1.08}
  .bigscore{font-family:'Fraunces',serif;font-weight:700;font-size:54px;line-height:1;margin:18px 0 2px;color:var(--gold)}
  .scoreline{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);margin-top:4px}

  .league{margin-top:24px;border-top:1px solid var(--line);padding-top:18px;text-align:left}
  .league h3{font-family:'Fraunces',serif;font-weight:600;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
  .league .lsub{font-size:13px;color:#a9bcae;margin-bottom:14px;line-height:1.45}
  .leg{display:flex;gap:12px;padding:11px 13px;border-radius:9px;background:var(--ink-3);margin-bottom:8px;border:1px solid transparent}
  .leg.me{border-color:var(--gold);background:rgba(194,163,93,.14)}
  .leg .rk{font-family:'Fraunces',serif;font-weight:700;font-size:18px;color:var(--gold);width:22px;flex:none;text-align:center;line-height:1.35}
  .leg .nm{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--paper);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .leg .nm .you{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;background:var(--gold);color:#241c0c;padding:2px 7px;border-radius:10px;text-transform:uppercase}
  .leg .ds{font-size:12.5px;line-height:1.45;color:#b7c6bc;margin-top:3px}

  .fade{animation:fade .45s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .footer{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#6f8478;letter-spacing:.5px;line-height:1.6;margin-top:4px}
  .footer span{color:var(--gold)}

  @media (max-width:430px){
    .card{padding:24px 18px 20px}
    .screen{padding:26px 20px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
  .protokol{margin-top:26px;text-align:left}
  .protokol h3{font-family:'Fraunces',serif;text-transform:uppercase;letter-spacing:2px;font-size:15px;color:var(--gold);margin-bottom:4px}
  .protokol .psub{font-size:13px;color:#a9bcae;margin-bottom:12px}
  .prow{display:flex;align-items:center;gap:12px;padding:9px 10px;border:1px solid var(--line);border-radius:6px;margin-bottom:7px;background:rgba(255,255,255,.02)}
  .prow .pmark{font-family:'Permanent Marker',cursive;font-size:19px;width:26px;text-align:center;flex-shrink:0}
  .prow .pmark.r{color:var(--green)}
  .prow .pmark.w{color:var(--red)}
  .prow .pnm{font-family:'Fraunces',serif;font-size:15px;letter-spacing:.4px}
  .prow .pln{font-size:12px;color:var(--muted)}
  .gate{min-height:62vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:24px;padding:50px 20px}
  .gate .gmeta{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:2px;color:#8fa596;text-transform:uppercase}
  .gate .gline{font-family:'Fraunces',serif;text-transform:uppercase;letter-spacing:3px;font-size:clamp(19px,5vw,27px);color:#f2ede2}
  .gate-btn{background:transparent;border:2px solid var(--gold);color:var(--gold);font-family:'Fraunces',serif;text-transform:uppercase;letter-spacing:3px;font-size:16px;padding:14px 32px;border-radius:6px;cursor:pointer;transition:background .2s}
  .gate-btn:hover{background:rgba(194,163,93,.14)}
  .gate .ghint{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:1px;color:#8fa596}
  .film-overlay{position:fixed;inset:0;background:#03130d;z-index:9998;display:flex;align-items:center;justify-content:center;opacity:1;transition:opacity .45s ease}
  .film-overlay.out{opacity:0}
  .film-card{opacity:0;transition:opacity .6s ease;text-align:center;padding:0 26px;max-width:760px;width:100%}

function playFilm(cards, next){
  const ov = document.createElement('div');
  ov.className = 'film-overlay';
  document.body.appendChild(ov);
  const skip = document.createElement('button');
  skip.className = 'film-skip'; skip.textContent = 'Spring over \u25b8';
  document.body.appendChild(skip);
  let idx = 0, timer = null, done = false;
  function finish(){
    if(done) return; done = true;
    clearTimeout(timer);
    ov.classList.add('out');
    setTimeout(()=>{ ov.remove(); skip.remove(); next(); }, 460);
  }
  skip.onclick = finish;
  function showCard(){
    if(idx >= cards.length){ finish(); return; }
    const c = cards[idx];
    ov.innerHTML = `<div class="film-card">
        ${c.hoved ? `<div class="film-hoved">${c.hoved}</div>` : `<div class="film-title">${c.line1}</div>`}
        ${c.line2 ? `<div class="film-sub">${c.line2}</div>` : ''}
      </div>`;
    requestAnimationFrame(()=> ov.querySelector('.film-card').classList.add('vis'));
    idx++;
    timer = setTimeout(()=>{
      const card = ov.querySelector('.film-card');
      if(card) card.classList.remove('vis');
      timer = setTimeout(showCard, 650);
    }, 2300);
  }
  showCard();
}

let ytApiLoaded = false;
function loadYouTubeAPI(cb){
  if(window.YT && window.YT.Player){ cb(); return; }
  if(!ytApiLoaded){
    ytApiLoaded = true;
    const s = document.createElement('script');
    s.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(s);
  }
  const prev = window.onYouTubeIframeAPIReady;
  window.onYouTubeIframeAPIReady = function(){ if(prev) prev(); cb(); };
  /* fallback hvis API'et ikke loader inden 4 sek. */
  setTimeout(()=>{ if(!(window.YT && window.YT.Player)) cb(); }, 4000);
}

    <div class="film-card vis">
      <div class="film-title" style="font-size:clamp(17px,4.5vw,26px);margin-bottom:6px">Arkivet \u00b7 ${VIDEO_KLIP.titel}</div>
      <div class="film-sub" style="margin:0 0 16px">${VIDEO_KLIP.under}</div>
      <div class="videoframe"><div id="yt-player"></div></div>
      <div class="film-sub" id="vid-hint" style="margin-top:12px">Tryk \u25b6 p\u00e5 videoen for at afspille klippet (0:37 til 1:01)</div>
    </div>`;
  document.body.appendChild(ov);
  const skip = document.createElement('button');
  skip.className = 'film-skip'; skip.textContent = 'Videre \u25b8';
  document.body.appendChild(skip);
  let done = false;
  function finish(){
    if(done) return; done = true;
    ov.classList.add('out');
    setTimeout(()=>{ ov.remove(); skip.remove(); next(); }, 460);
  }
  skip.onclick = finish;

  loadYouTubeAPI(()=>{
    if(window.YT && window.YT.Player){
      new YT.Player('yt-player', {
        videoId: VIDEO_KLIP.id,
        playerVars: { start: VIDEO_KLIP.start, end: VIDEO_KLIP.end, autoplay: 1, rel: 0, modestbranding: 1, playsinline: 1 },
        events: {
          /* iOS blokerer autoplay med lyd, saa vi forsoeger, men regner ikke med det */
          onReady: (e)=>{ try{ e.target.playVideo(); }catch(_){} },
          onStateChange: (e)=>{
            const hint = document.getElementById('vid-hint');
            if(e.data === YT.PlayerState.PLAYING && hint) hint.style.visibility = 'hidden';
            if(e.data === YT.PlayerState.ENDED) setTimeout(finish, 900);
          }
        }
      });
    } else {
      /* nødplan: almindelig iframe, klippet stopper selv ved 1:01, brugeren trykker Videre */
      document.getElementById('yt-player').outerHTML =
        `<iframe src="https://www.youtube.com/embed/${VIDEO_KLIP.id}?start=${VIDEO_KLIP.start}&end=${VIDEO_KLIP.end}&autoplay=1&rel=0&playsinline=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    }
  });
}

/* ---------- Spillets skærme ---------- */
function gate(){
  recordEl.style.display = 'none';
  caseCount.textContent = '';
  app.innerHTML = `
    <div class="gate fade">
      <div class="gmeta">Fortroligt materiale // adgang kun for indkaldte</div>
      <div class="gline">Forhandlingsbordet venter p\u00e5 dig.</div>
      <div class="ghint">Spilles bedst med lyd \u00b7 ca. 10 minutter</div>
      <button class="gate-btn" id="gate-go">Er du klar? \u25b8</button>
    </div>`;
  document.getElementById('gate-go').onclick = ()=>{
    if(document.getElementById('gate-go').disabled) return;
    document.getElementById('gate-go').disabled = true;
    creditsShown = true;
    playFilm(CREDITS_FILM, intro);
  };
}

function intro(){
  recordEl.style.display = 'none';
  caseCount.textContent = '';
  app.innerHTML = `
    <div class="panel fade">
      <div class="card">
        <div class="stamp land">Fortroligt</div>
        <div class="meta">Sagsmappe // den danske model</div>
        <h1 class="cover-title">Flex <span class="amp">&amp;</span> Tryghed</h1>
        <div class="cover-sub">Den Danske Model</div>
        <svg class="gtri" viewBox="0 0 240 158" aria-hidden="true">
          <polygon points="120,26 18,134 222,134"/>
          <text x="120" y="14" text-anchor="middle">Fleksibilitet</text>
          <text x="14" y="152" text-anchor="start">Dagpenge</text>
          <text x="226" y="152" text-anchor="end">Aktiv indsats</text>
        </svg>
        <div class="dossier">
          <div class="drow"><span class="dk">Klient</span><span class="redact" style="width:150px"></span></div>
          <div class="drow"><span class="dk">Din status</span><span class="dv">Praktikant ved forhandlingsbordet</span></div>
          <div class="drow"><span class="dk">Opgave</span><span class="dv">10 \u00f8jeblikke. Kend din model.</span></div>
        </div>
        <p class="situation">Du er helt ny i maskinrummet bag den danske model. Inden forhandlerlegenderne lukker dig ind ved det store bord, s\u00e6tter de dig p\u00e5 pr\u00f8ve: Kender du overhovedet modellens historie?</p>
        <p class="situation" style="margin-top:12px">Ti afg\u00f8rende \u00f8jeblikke fra 1899 til i dag, fra Septemberforliget over flexicurity til slaget om mindstel\u00f8nnen. For hvert skal du svare p\u00e5, hvad der faktisk skete. Tre svarmuligheder, alle plausible, men kun \u00e9n er sand. Jo flere du rammer, jo mere legendarisk en mentor ringer til sidst.</p>
        <button class="btn go big" id="start" style="margin-top:18px">\ud83e\udd1d Tag plads ved bordet \u25b8</button>
      </div>
    </div>`;
  document.getElementById('start').onclick = startGame;
}

function startGame(){
  state = { i:0, history:[], rigtige:0, slots:[], started:true, videoDone:false, deck:FASTE.map(s=> LEVELS.findIndex(l=>l.sag===s)) };
  recordEl.style.display = 'flex';
  renderRecord();
  if(!creditsShown){
    creditsShown = true;
    playFilm(CREDITS_FILM, showCase);
  } else {
    showCase();
  }
}

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function parseBased(b){ const p=b.split('\u00b7').map(s=>s.trim()); return {land:p[0]||'', person:p[1]||'', aar:p[p.length-1]||''}; }

function showCase(){
  const lv = LEVELS[state.deck[state.i]];
  const b = parseBased(lv.based);
  const nr = String(state.i+1).padStart(2,'0');
  const ord = shuffle([0,1,2]);
  state.slots = ord;
  caseCount.textContent = 'SAG ' + (state.i+1) + ' / 10';
  renderRecord();

  const buttons = ord.map((optIdx,slot)=>{
    const o = lv.svar[optIdx];
    return `<button class="choice" data-slot="${slot}"><span class="key">${SLOTS[slot]}</span><span>${o.t}</span></button>`;
  }).join('');

  app.innerHTML = `
    <div class="panel fade">
      <div class="card has-portrait">
        <div class="stamp">Aktiv sag</div>
        <div class="portrait"><img src="images/${PORTRAITS[lv.sag]}" alt="${b.person}" onerror="this.parentElement.style.display='none';this.closest('.card').classList.remove('has-portrait')"></div>
        <div class="meta">Sag nr. ${nr}</div>
        <div class="country">${b.land}</div>
        <h2 class="case-title">${lv.titel}</h2>
        <div class="cardsub">${b.person} \u00b7 ${b.aar}</div>
        <p class="situation">${lv.situation}</p>
        <div class="prompt">Sp\u00f8rgsm\u00e5l</div>
        <p class="question">${lv.spm}</p>
        <div class="choices">${buttons}</div>
      </div>
    </div>`;
  window.scrollTo(0, 0);
  app.querySelectorAll('.choice').forEach(b=>{ b.onclick = ()=> choose(parseInt(b.dataset.slot,10)); });
}

function choose(slot){
  const lv = LEVELS[state.deck[state.i]];
  const b = parseBased(lv.based);
  const nr = String(state.i+1).padStart(2,'0');
  const picked = lv.svar[ state.slots[slot] ];
  const good = !!picked.ok;
  const correct = lv.svar.find(o=>o.ok);
  const q = CITATER[lv.sag];

  state.history[state.i] = good;
  if(good) state.rigtige++;
  renderRecord();

  app.innerHTML = `
    <div class="panel fade">
      <div class="card has-portrait">
        <div class="stamp land" style="${good?'color:var(--green)':''}">${good ? 'Rigtigt' : 'Forkert'}</div>
        <div class="portrait"><img src="images/${PORTRAITS[lv.sag]}" alt="${b.person}" onerror="this.parentElement.style.display='none';this.closest('.card').classList.remove('has-portrait')"></div>
        <div class="meta">Sag nr. ${nr} \u00b7 dit svar</div>
        <div class="country">${b.land}</div>
        <h2 class="case-title">${lv.titel}</h2>
        <div class="verdict ${good?'good':'bad'}"><span class="dot"></span>${good ? 'Rigtigt svar' : 'Forkert svar'}</div>
        ${good ? '' : `<div class="vsub">Du svarede: ${picked.t}</div>`}
        <div class="answer"><span class="alab">Det rigtige svar</span>${correct.t}</div>
        <div class="truth"><span class="lab">S\u00e5dan gik det i virkeligheden \u00b7 ${b.aar}</span>${lv.forklaring}</div>
        <div class="qbox"><div class="qlab">Til eftertanke</div><div class="qt">${q.t}</div><div class="qk">${q.k}</div></div>
        <div class="actions" id="act"></div>
      </div>
    </div>`;

  window.scrollTo(0, 0);
  const act = document.getElementById('act');
  if(state.i === RUNDE - 1){
    act.innerHTML = `<button class="btn go big" id="next">Se hvem der ringer \u25b8</button>`;
    document.getElementById('next').onclick = ()=> ending();
  } else {
    /* Efter sag 04 (Thomas Nielsen) vises videoklippet som interlude */
    if(lv.sag === "04" && !state.videoDone){
      act.innerHTML = `<button class="btn go big" id="next">\ud83c\udfac Se klippet fra 1982 \u25b8</button>`;
      document.getElementById('next').onclick = ()=>{
        state.videoDone = true;
        videoInterlude(()=>{ state.i++; showCase(); });
      };
    } else {
      act.innerHTML = `<button class="btn big" id="next">N\u00e6ste sag \u25b8</button>`;
      document.getElementById('next').onclick = ()=>{ state.i++; showCase(); };
    }
  }
}

function ending(){
  const r = state.rigtige;
  const rankIdx = r >= 5 ? (10 - r) : 6;
  const leg = LEGENDS[rankIdx];
  const grid = state.history.map(h=> h ? '\u2705' : '\u274c').join('');

  caseCount.textContent = 'AFSLUTTET';
  recordEl.style.display = 'flex';
  renderRecord();

  const league = LEGENDS.map((L,i)=>`
    <div class="leg ${i===rankIdx?'me':''}">
      <div class="rk">${i+1}</div>
      <div>
        <div class="nm">${L.navn} ${i===rankIdx?'<span class="you">Din mentor</span>':''}</div>
        <div class="ds">${L.desc}</div>
      </div>
    </div>`).join('');

  const protokol = state.history.map((h,i)=>{
    const lv = LEVELS[state.deck[i]];
    const b = parseBased(lv.based);
    return `<div class="prow">
      <div class="pmark ${h?'r':'w'}">${h?'\u2713':'\u2717'}</div>
      <div><div class="pnm">${lv.titel}</div><div class="pln">${b.person} \u00b7 ${b.aar}</div></div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="screen fade" style="text-align:center">
      <div class="phone">\ud83d\udcde</div>
      <div class="kicker">Telefonen ringer</div>
      <div class="rank-badge">${leg.navn} vil tale med dig</div>
      <p class="lede" style="margin:0 auto">I r\u00f8ret: ${leg.flavor}. ${leg.pron==='hun'?'Hun':'Han'} har fulgt din pr\u00f8ve og tilbyder dig en plads ved forhandlingsbordet.</p>
      <div class="bigscore">${r}<span style="font-size:26px;color:var(--muted)">/10</span></div>
      <div class="scoreline">rigtige svar om den danske model</div>
      <div class="sharegrid">${grid}</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px">
        <button class="btn go" id="share">Del dit resultat</button>
        <button class="btn" id="again">Pr\u00f8v igen \u25b8</button>
      </div>
      <div class="league">
        <h3>Forhandlerligaen</h3>
        <div class="lsub">Jo flere rigtige, jo mere legendarisk en mentor ringer. 10 rigtige giver Stauning selv i r\u00f8ret.</div>
        ${league}
      </div>
      <div class="protokol">
        <h3>Protokollen</h3>
        <div class="psub">Dine ti sager, som de blev f\u00f8rt til protokols.</div>
        ${protokol}
      </div>
    </div>`;
  window.scrollTo(0, 0);
  document.getElementById('again').onclick = startGame;
  document.getElementById('share').onclick = ()=> showShareMenu(r, leg.navn, grid);
}

function showShareMenu(r, mentor, grid){
  const text = 'Flex & Tryghed: Den Danske Model\n' + r + '/10, mentor: ' + mentor + '\n' + grid + '\nKan du sl\u00e5 mig? ' + location.href;
  const eText = encodeURIComponent(text);
  const eUrl = encodeURIComponent(location.href);
  const modal = document.createElement('div');
  modal.className = 'share-modal';
  modal.innerHTML = `
    <div class="share-box">
      <h3>Del dit resultat</h3>
      <div class="share-list">
        <a class="share-btn" href="https://www.facebook.com/sharer/sharer.php?u=${eUrl}" target="_blank" rel="noopener"><span class="ico fb">f</span>Facebook</a>
        <a class="share-btn" href="https://twitter.com/intent/tweet?text=${eText}" target="_blank" rel="noopener"><span class="ico x">\ud835\udd4f</span>X</a>
        <a class="share-btn" href="https://wa.me/?text=${eText}" target="_blank" rel="noopener"><span class="ico wa">\u2706</span>WhatsApp</a>
        <a class="share-btn" href="https://t.me/share/url?url=${eUrl}&text=${eText}" target="_blank" rel="noopener"><span class="ico tg">\u2708</span>Telegram</a>
        <button class="share-btn" id="share-copy"><span class="ico cp">\u2398</span>Kopi\u00e9r resultat</button>
      </div>
      <button class="share-close" id="share-close">Luk</button>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e=>{ if(e.target===modal) modal.remove(); });
  document.getElementById('share-close').onclick = ()=> modal.remove();
  document.getElementById('share-copy').onclick = ()=>{
    navigator.clipboard.writeText(text).then(()=>{
      const b = document.getElementById('share-copy');
      b.innerHTML = '<span class="ico cp">\u2713</span>Kopieret!';
    });
  };
}

/* Til test: previewEnding(7) i konsollen viser slutsk\u00e6rmen med en given score */
function previewEnding(fakeScore){
  state.deck = FASTE.map(s=> LEVELS.findIndex(l=>l.sag===s));
  state.rigtige = fakeScore;
  state.history = [...Array(RUNDE)].map((_,i)=> i < fakeScore);
  ending();
}

gate();
</script>
